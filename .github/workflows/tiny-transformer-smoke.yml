name: lab5-tiny-transformer-smoke

on:
  workflow_dispatch:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tiny transformer smoke test
        env:
          WANDB_MODE: offline
          TOKENIZERS_PARALLELISM: false
        run: |
          python run_lab5.py \
            --dataset local_csv \
            --data_path data/raw/sample_imdb_tiny.csv \
            --model_name hf-internal-testing/tiny-random-distilbert \
            --max_rows 40 \
            --max_length 64 \
            --batch_size 4 \
            --epochs 1 \
            --lr 5e-5 \
            --wandb_mode offline \
            --use_wandb
      - name: Check generated artifacts
        run: |
          test -f outputs/logs/tokenization_audit.md
          test -f outputs/metrics/metrics_summary.json
          test -f outputs/metrics/epoch_history.csv
          test -f outputs/figures/confusion_matrix.png
          test -f outputs/predictions/test_predictions.csv
          test -f outputs/error_analysis/error_analysis.csv
